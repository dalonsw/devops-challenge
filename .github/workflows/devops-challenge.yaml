name: Build Imagem do Docker

on:
  push:
    branches:
      - main
      - feat/cicd-pipeline

jobs:
  lint-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Instalar dependências e pylint
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint 

      - name: Lint do código com pylint
        run: pylint ./app/*.py

  build:
    runs-on: ubuntu-latest
    needs: lint-code

    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e envio da imagem para DockerHub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-challenge:latest

  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Instalar Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan da imagem Docker com Trivy
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 ${{ secrets.DOCKER_USERNAME }}/devops-challenge:latest

      