apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-challenge
  labels:
    app: devops-challenge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-challenge
  template:
    metadata:
      labels:
        app: devops-challenge
    spec:
      containers:
        - name: devops-challenge
          image: devops-challenge:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ENV
              value: "PROD"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3